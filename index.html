<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal de Recursos Digitais</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #1f3c88, #3b5998, #eef2f7);
  background-attachment: fixed;
}

/* HEADER */
.menu {
  background: rgba(31, 60, 136, 0.95);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  height: 45px;
}

.menu-links {
  display: flex;
  align-items: center;
}

.menu a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: 500;
}

.menu a:hover {
  color: #ffd700;
}

.menu-toggle {
  display: none;
  font-size: 25px;
  color: white;
}

/* DROPDOWN */
.dropdown, .dropdown-sub {
  position: relative;
}

.dropdown-content, .dropdown-sub-content {
  display: none;
  position: absolute;
  background: white;
  min-width: 230px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.dropdown-content { top: 100%; }
.dropdown-sub-content { left: 100%; top: 0; }

.show { display: block; }

.dropdown-content a, .dropdown-sub-content a {
  display: block;
  padding: 12px;
  color: #1f3c88;
}

.dropdown-content a:hover, .dropdown-sub-content a:hover {
  background: #f1f1f1;
}

.dropdown-sub > a::after {
  content: " ▶";
  float: right;
}

.pdf-icon::before { content: "📄 "; }

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
  color: white;
}

.hero h1 {
  font-size: 40px;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 30px;
  flex-wrap: wrap;
}

.card {
  background: white;
  width: 250px;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  color: #1f3c88;
}

/* CONTATO */
.contato {
  background: white;
  margin: 40px auto;
  padding: 30px;
  width: 60%;
  border-radius: 15px;
  text-align: center;
}

input, textarea {
  width: 80%;
  padding: 10px;
  margin: 10px;
}

button {
  background: #1f3c88;
  color: white;
  padding: 10px 20px;
  border: none;
  cursor: pointer;
}

/* RESPONSIVO */
@media (max-width: 768px) {
  .menu-links {
    display: none;
    flex-direction: column;
    background: #1f3c88;
    width: 100%;
  }

  .menu-toggle {
    display: block;
  }

  .cards {
    flex-direction: column;
    align-items: center;
  }

  .contato {
    width: 90%;
  }
}
</style>
</head>

<body>

<div class="menu">
  <!-- COLOQUE SUA LOGO AQUI -->
  <img src="sua-logo.png" class="logo">

  <div class="menu-toggle" onclick="toggleMobile()">☰</div>

  <div class="menu-links" id="menuLinks">

    <a href="#">Início</a>

    <div class="dropdown">
      <a onclick="toggleMenu('menu1', event)">Recursos ▼</a>

      <div id="menu1" class="dropdown-content">

        <div class="dropdown-sub">
          <a onclick="toggleMenu('matific', event)">Matific</a>
          <div id="matific" class="dropdown-sub-content">
            <a class="pdf-icon" href="#">Turmas</a>
          </div>
        </div>

        <div class="dropdown-sub">
          <a onclick="toggleMenu('khan', event)">Khan</a>
          <div id="khan" class="dropdown-sub-content">

            <div class="dropdown-sub">
              <a onclick="toggleMenu('khanmigo', event)">Khanmigo</a>
              <div id="khanmigo" class="dropdown-sub-content">
                <a class="pdf-icon" href="#">Manual</a>
                <a class="pdf-icon" href="#">Ferramentas</a>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>

    <a href="#contato">Contato</a>

  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Portal de Recursos Digitais</h1>
  <p>Plataforma de apoio à aprendizagem em Matemática</p>
</div>

<!-- CARDS -->
<div class="cards">

  <div class="card" onclick="window.open('https://www.matific.com')">
    <h3>Matific</h3>
    <p>Acesso à plataforma</p>
  </div>

  <div class="card" onclick="window.open('https://www.khanacademy.org')">
    <h3>Khan Academy</h3>
    <p>Aprendizagem interativa</p>
  </div>

</div>

<!-- CONTATO -->
<div class="contato" id="contato">
  <h2>Contato</h2>
  <input type="text" placeholder="Seu nome"><br>
  <input type="email" placeholder="Seu email"><br>
  <textarea placeholder="Mensagem"></textarea><br>
  <button>Enviar</button>
</div>

<script>
function toggleMenu(id, event) {
  event.stopPropagation();
  document.querySelectorAll('.dropdown-content, .dropdown-sub-content')
    .forEach(el => el.classList.remove('show'));
  document.getElementById(id).classList.toggle('show');
}

document.addEventListener('click', () => {
  document.querySelectorAll('.dropdown-content, .dropdown-sub-content')
    .forEach(el => el.classList.remove('show'));
});

function toggleMobile() {
  const menu = document.getElementById("menuLinks");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}
</script>

</body>
</html>
